<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catraz Guardian</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 12px;
        width: 320px;
        background: #0b1220;
        color: #e5e7eb;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      .card {
        border: 1px solid #263247;
        border-radius: 8px;
        padding: 10px;
        background: #111a2d;
      }
      .badge {
        display: inline-block;
        font-size: 12px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 999px;
      }
      .ALLOW { background: #11331f; color: #97f0b0; }
      .WARN { background: #3a2b0f; color: #ffd98e; }
      .BLOCK { background: #40151a; color: #ffb3be; }
      .DELAY { background: #2f2557; color: #d3b6ff; }
      .row { margin-top: 8px; font-size: 12px; line-height: 1.35; }
      .muted { color: #9ca3af; }
    </style>
  </head>
  <body>
    <h1>Catraz Guardian</h1>
    <div class="card">
      <div id="action" class="badge WARN">NO DATA</div>
      <div class="row" id="reason">No intercepted transaction yet.</div>
      <div class="row muted" id="method"></div>
      <div class="row muted" id="time"></div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
